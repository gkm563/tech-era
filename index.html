<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ── -->
    <title>TechEra Community — Hackathons, Workshops & Tech Events for Developers</title>
    <meta
      name="description"
      content="TechEra is a student-led tech community hosting hackathons, workshops, and speaker sessions. Join 500+ developers building the future of tech together."
    />
    <meta name="keywords" content="tech community, hackathon, developer community, workshops, tech events, TechEra, coding, speakers, student developers" />
    <meta name="author" content="TechEra Community" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://techera.community/" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/jpeg" href="/images/logo.jpg" />
    <link rel="apple-touch-icon" href="/images/logo.jpg" />
    <meta name="theme-color" content="#020617" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://techera.community/" />
    <meta property="og:title"       content="TechEra Community — Hackathons, Workshops & Tech Events" />
    <meta property="og:description" content="Join 500+ developers in India's fastest-growing student tech community. Hackathons, workshops, speaker sessions and more." />
    <meta property="og:image"       content="https://techera.community/images/logo.jpg" />
    <meta property="og:image:alt"   content="TechEra Community logo" />
    <meta property="og:locale"      content="en_IN" />
    <meta property="og:site_name"   content="TechEra Community" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@techera_community" />
    <meta name="twitter:creator"     content="@techera_community" />
    <meta name="twitter:title"       content="TechEra Community — Hackathons, Workshops & Tech Events" />
    <meta name="twitter:description" content="Join 500+ developers in India's fastest-growing student tech community." />
    <meta name="twitter:image"       content="https://techera.community/images/logo.jpg" />
    <meta name="twitter:image:alt"   content="TechEra Community" />

    <!-- ── Performance hints ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Space Grotesk   → punchy geometric display / headings
      Plus Jakarta Sans → premium warm body text
      JetBrains Mono  → iconic dev font for code / accent labels
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700;1,800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
